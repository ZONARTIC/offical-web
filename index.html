<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Gallery Site - Pixiv Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container header-content">
            <div class="logo">
                <img src="https://via.placeholder.com/120x40?text=PIXIV+LOGO" alt="Logo">
            </div>
            <div class="info-contact">
                <p>info contact</p>
                <p>info contact</p>
            </div>
        </div>
    </header>

    <div class="container">
        
        <nav class="tags">
            <span class="tag" style="background: #a29bfe;">tag 1</span>
            <span class="tag" style="background: #55efc4;">tag 2</span>
            <span class="tag" style="background: #fab1a0;">tag 3</span>
            <span class="tag" style="background: #81ecec;">tag 4</span>
            <span class="tag" style="background: #fd79a8;">tag 5</span>
            <span class="tag" style="background: #74b9ff;">tag 6</span>
        </nav>

        <main class="gallery">
            
            <a href="page1.html" class="card">
                <div class="image-box">
                    <img src="https://via.placeholder.com/400x400" alt="Work 1">
                </div>
                <div class="card-info">
                    <h3>Morning Express Delivery Post</h3>
                    <p class="author">by vania600</p>
                    <div class="stats">⭐ 7840</div>
                </div>
            </a>

            <a href="page2.html" class="card">
                <div class="image-box">
                    <img src="https://via.placeholder.com/400x400" alt="Work 2">
                </div>
                <div class="card-info">
                    <h3>Silhouette Weapon</h3>
                    <p class="author">by JNTHED</p>
                    <div class="stats">⭐ 206</div>
                </div>
            </a>

            <a href="page3.html" class="card">
                <div class="image-box">
                    <img src="https://via.placeholder.com/400x400" alt="Work 3">
                </div>
                <div class="card-info">
                    <h3>Nut Rocker</h3>
                    <p class="author">by anofelus</p>
                    <div class="stats">⭐ 192</div>
                </div>
            </a>

            <a href="page4.html" class="card">
                <div class="image-box">
                    <img src="https://via.placeholder.com/400x400" alt="Work 4">
                </div>
                <div class="card-info">
                    <h3>Black Rock Shooter 3</h3>
                    <p class="author">by huke</p>
                    <div class="stats">⭐ 4058</div>
                </div>
            </a>

        </main>
    </div>

    <footer class="ad-footer">
        <div class="ad-container">
            <p>BANNER ADSENSE HERE</p>
        </div>
    </footer>

</body>
</html>
